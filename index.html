<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MatchApp</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; height: 600px; background: white; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; position: absolute; padding: 20px; text-align: center; }
        .active { display: flex; }
        .profile-screen { background: linear-gradient(135deg, #ff4b6e, #ff856f); color: white; justify-content: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 25px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #ff4b6e; color: white; border: none; border-radius: 25px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; }
        .profile-screen button { background: white; color: #ff4b6e; }
        .card-img { flex: 1; background-size: cover; background-position: center; border-radius: 15px; margin-bottom: 20px; display: flex; align-items: flex-end; padding: 20px; color: white; font-weight: bold; font-size: 24px; text-shadow: 1px 1px 5px black; }
        .chat-messages { flex: 1; padding: 10px; overflow-y: auto; background: #f7f7f7; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px; border-radius: 15px; max-width: 70%; text-align: left; }
        .sent { background: #ff4b6e; color: white; align-self: flex-end; }
        .received { background: #e4e6eb; color: black; align-self: flex-start; }
    </style>
</head>
<body>

<div class="app-container">

    <!-- ECRÃ 1: PERFIL -->
    <div id="screen1" class="screen active profile-screen">
        <h2>Cria o teu Perfil ❤️</h2>
        <input type="text" placeholder="Teu Nome (Opcional)">
        <button onclick="irParaEcra('screen2')">Entrar no MatchApp</button>
    </div>

    <!-- ECRÃ 2: TINDER -->
    <div id="screen2" class="screen">
        <h2 style="color: #ff4b6e; margin-bottom: 20px;">MatchApp 🔥</h2>
        <div class="card-img" style="background-image: url('https://unsplash.com')">
            Ana, 24
        </div>
        <button onclick="irParaEcra('screen3')">❤️ Dar Like & Conversar</button>
    </div>

    <!-- ECRÃ 3: CHAT -->
    <div id="screen3" class="screen">
        <h2 style="color: #ff4b6e; margin-bottom: 20px;">Conversa com Ana</h2>
        <div class="chat-messages">
            <div class="message received">Olá! Tudo bem? Gostei do teu perfil! 😊</div>
        </div>
        <input type="text" id="msgInput" placeholder="Escreve aqui...">
        <button onclick="enviar()">➔ Enviar</button>
    </div>

</div>

<script>
    function irParaEcra(idEcra) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(idEcra).classList.add('active');
    }

    function enviar() {
        const input = document.getElementById('msgInput');
        if(input.value.trim() === "") return;
        const box = document.querySelector('.chat-messages');
        
        const m = document.createElement('div');
        m.className = 'message sent';
        m.innerText = input.value;
        box.appendChild(m);
        input.value = "";
        
        setTimeout(() => {
            const r = document.createElement('div');
            r.className = 'message received';
            r.innerText = "Que bom! O que fazes por aqui?";
            box.appendChild(r);
        }, 1500);
    }
</script>

</body>
</html>
